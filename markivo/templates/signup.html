{% extends 'base.html' %}

{% block title %}Create Account{% endblock %}

{% block content %}
<section class="section-padding" style="min-height: 80vh; display: flex; align-items: center;">
    <div class="form-box glass">
        <h2 style="text-align: center; margin-bottom: 2rem;">Join <span>Markivo</span></h2>
        <form action="/signup" method="POST">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="username" placeholder="John Doe" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="email@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Create a strong password" required>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" required>
            </div>
            <button type="submit" class="btn-main" style="width: 100%;">Register Now</button>
        </form>
        <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
            Already a member? <a href="{{ url_for('login') }}" style="color: var(--primary-color);">Login here</a>
        </p>
    </div>
</section>
{% endblock %}
