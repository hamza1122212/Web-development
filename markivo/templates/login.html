{% extends 'base.html' %}

{% block title %}Client Login{% endblock %}

{% block content %}
<section class="section-padding" style="min-height: 80vh; display: flex; align-items: center;">
    <div class="form-box glass">
        <h2 style="text-align: center; margin-bottom: 2rem;">Welcome <span>Back</span></h2>
        <form action="/login" method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="email@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-main" style="width: 100%;">Sign In</button>
        </form>
        <p style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
            Don't have an account? <a href="{{ url_for('signup') }}" style="color: var(--primary-color);">Create one</a>
        </p>
    </div>
</section>
{% endblock %}
